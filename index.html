<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYDRA App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #121212;
      overflow: hidden;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

 <iframe src="Https://script.google.com/macros/s/AKfycbyY9WP_m7FQygk2iAtFMNJldbYDRBkuXDI4ue0xtz1fUmEhL-Bs96PExVlUkSQn7eJXEA/exec" 
        style="border:none;width:100%;height:100vh;" 
        allow="clipboard-read; clipboard-write; display-capture" 
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups">
</iframe>
 
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker зареєстровано!'))
          .catch(err => console.error('Помилка реєстрації SW:', err));
      });
    }

    // Код для коректної висоти на мобільних пристроях
    const fixHeight = () => {
      document.body.style.height = window.innerHeight + 'px';
    };
    window.addEventListener('resize', fixHeight);
    fixHeight();
  </script>
</body>
</html>
